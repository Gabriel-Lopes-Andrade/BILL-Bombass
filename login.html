<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - Hidráulica Pro</title>
</head>
<body>
    <header class="logo">
        <img src="./IMG/Windows.png" alt="logo">
        <ul>
            <a href="index.html">Home</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
            <a id="log-icon" href="login.html">Login</a>
        </ul>
    </header>

    <main>
        <div class="card">
            <img src="./IMG/Windows.png" alt="Logo">
            <h2>Login</h2>
            <form id="form">
                <input id="email" type="email" placeholder="Seu E-mail" />
                <input id="senha" type="password" placeholder="Digite sua senha" />
                <p id="mensagem-erro" style="display:none; color:#c0392b; font-size:13px; text-align:center; font-weight:600; margin-bottom:8px;"></p>
                <button id="button" type="submit">Acessar</button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
