<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo - Hidráulica Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="cabecalho">
            <h2>Sistema Hidráulica Pro</h2>
            <a href="index.html">Sair</a>
        </div>
    </header>

    <div class="container-princ">
        <!-- Coluna Lateral -->
        <nav class="barra-lat">
            <ul>
                <li><a href="" class="active" onclick="abrirConsulta(event)">Consultar Pedido</a></li>
            </ul>
        </nav>

        <!-- Card Bem-vindo -->
        <div id="tela-bemvindo" class="bem-vindo">
            <h2>Bem-vindo</h2>
            <p>Selecione uma opção no menu lateral.</p>
        </div>

        <!-- Card Consulta -->
        <div id="tela-consulta" class="card" style="display:none; margin:auto; height:fit-content; flex:1; ">
            <h2>Consulta de Bombas</h2>
            <input id="input-consulta" type="number" placeholder="Nº do Pedido" />
            <p id="erro-consulta" style="display:none; color:#c0392b; font-size:13px; text-align:center; font-weight:600; margin-bottom:8px;"></p>
            <div id="resultado-pedido" style="display:none;"></div>
            <button type="button" style="background-color:#24ad09;" onclick="consultarPedido()">Consultar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
